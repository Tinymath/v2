<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>tinymath</title>

<link id="dynamicFavicon" rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<text y='.9em' font-size='90'>🎮</text></svg>">

<meta name="description" content="TinyMath — books made easy">

<style>
/* ---------------- GLOBAL ---------------- */
body {
  background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
  color: #fff;
  font-family: "Segoe UI", Arial, sans-serif;
  margin: 0;
  padding: 0;
  text-align: center;
  transition: background 0.3s ease, color 0.3s ease;
}

h1 {
  margin: 30px 0 10px;
  font-size: 48px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-shadow: 0 0 10px rgba(255,255,255,0.2);
}

/* ---------------- SETTINGS BUTTON ---------------- */
.settings-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  padding: 12px 18px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  z-index: 9999;
  transition: 0.2s;
}

.settings-btn:hover {
  background: rgba(255,255,255,0.2);
}

/* ---------------- SETTINGS PANEL ---------------- */
#settingsPanel {
  position: fixed;
  top: 70px;
  right: 15px;
  background: rgba(20,20,20,0.7);
  backdrop-filter: blur(12px);
  padding: 20px;
  border-radius: 14px;
  width: 260px;
  display: none;
  z-index: 9999;
  color: white;
  border: 1px solid rgba(255,255,255,0.15);
}

#settingsPanel h3 {
  margin-top: 0;
  font-size: 22px;
}

.theme-btn {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  color: white;
  transition: 0.2s;
}

.theme-btn:hover {
  background: rgba(255,255,255,0.2);
}

.color-input {
  width: 100%;
  padding: 8px;
  margin-top: 6px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

/* ---------------- SEARCH ---------------- */
#searchBar {
  width: 380px;
  padding: 14px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  outline: none;
  margin-bottom: 30px;
  background: rgba(255,255,255,0.1);
  color: white;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.2);
}

/* ---------------- GAME GRID ---------------- */
#buttons {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 30px;
  padding: 20px;
  max-width: 1300px;
  margin: auto;
}

.game-card {
  text-align: center;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  padding: 18px;
  border-radius: 16px;
  transition: transform 0.25s ease, background 0.25s ease;
  border: 1px solid rgba(255,255,255,0.15);
}

.game-card:hover {
  transform: translateY(-7px);
  background: rgba(255,255,255,0.15);
}

.game-card img {
  width: 160px;
  height: 160px;
  object-fit: cover;
  border-radius: 14px;
  cursor: pointer;
  transition: transform 0.25s ease;
}

.game-card img:hover {
  transform: scale(1.07);
}

/* ---------------- BUTTONS ---------------- */
.game-card button {
  width: 160px;
  padding: 12px;
  margin-top: 12px;
  font-size: 17px;
  border-radius: 12px;
  border: 2px solid #1e90ff;
  background: rgba(30,144,255,0.15);
  color: #1e90ff;
  cursor: pointer;
  transition: 0.25s ease;
  box-shadow: 0 0 10px rgba(30,144,255,0.4);
  backdrop-filter: blur(6px);
}

.game-card button:hover {
  background: #1e90ff;
  color: #000;
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 0 18px rgba(30,144,255,0.8);
}
</style>
</head>

<body>

<!-- SETTINGS BUTTON -->
<button class="settings-btn" onclick="toggleSettings()">⚙️ </button>

<!-- SETTINGS PANEL -->
<div id="settingsPanel">
  <h3>Settings</h3>

  <label>Background Color:</label>
  <input type="color" id="bgColorPicker" class="color-input">

  <button class="theme-btn" onclick="setTheme('dark')">Dark Theme</button>
  <button class="theme-btn" onclick="setTheme('light')">Light Theme</button>
  <button class="theme-btn" onclick="setTheme('neon')">Neon Theme</button>
  <button class="theme-btn" onclick="setTheme('amoled')">AMOLED Black</button>

  <hr style="margin:15px 0; border-color:rgba(255,255,255,0.2);">

  <h3>Tab Cloaking</h3>

  <label>Custom Title:</label>
  <input type="text" id="titleInput" class="color-input" placeholder="Enter tab title">

  <label>Custom Favicon URL:</label>
  <input type="text" id="faviconInput" class="color-input" placeholder="Enter favicon URL">

  <button class="theme-btn" onclick="applyCloak()">Apply Cloak</button>

  <button class="theme-btn" onclick="cloakPreset('Google Docs', 'https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png')">
    Google Docs
  </button>

  <button class="theme-btn" onclick="cloakPreset('Google Classroom', 'https://ssl.gstatic.com/classroom/favicon.png')">
    Google Classroom
  </button>

  <button class="theme-btn" onclick="cloakPreset('Calculator', 'https://www.google.com/favicon.ico')">
    Calculator
  </button>

  <button class="theme-btn" onclick="resetCloak()">Reset Tab</button>
</div>

<!-- MAIN CONTENT -->
<h1>tinymath</h1>
<input id="searchBar" type="text" placeholder="Search books...">
<div id="buttons"></div>

<script>
/* SETTINGS PANEL */
function toggleSettings() {
  const panel = document.getElementById("settingsPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

/* BACKGROUND COLOR PICKER */
document.getElementById("bgColorPicker").addEventListener("input", (e) => {
  document.body.style.background = e.target.value;
});

/* THEMES */
function setTheme(theme) {
  if (theme === "dark") {
    document.body.style.background = "#0d0d0d";
    document.body.style.color = "#fff";
  }
  if (theme === "light") {
    document.body.style.background = "#f2f2f2";
    document.body.style.color = "#000";
  }
  if (theme === "neon") {
    document.body.style.background = "#0f002b";
    document.body.style.color = "#39ff14";
  }
  if (theme === "amoled") {
    document.body.style.background = "#000";
    document.body.style.color = "#fff";
  }
}

/* TAB CLOAKING */
function applyCloak() {
  const title = document.getElementById("titleInput").value;
  const favicon = document.getElementById("faviconInput").value;

  if (title) document.title = title;
  if (favicon) document.getElementById("dynamicFavicon").href = favicon;
}

function cloakPreset(title, icon) {
  document.title = title;
  document.getElementById("dynamicFavicon").href = icon;
}

function resetCloak() {
  document.title = "TinyMath";
  document.getElementById("dynamicFavicon").href =
    "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>";
}

/* GAME SYSTEM */
const games = [];

function add(name, url, img = null) {
  games.push({ name, url, img });

  const card = document.createElement("div");
  card.className = "game-card";
  card.dataset.name = name.toLowerCase();

  if (img) {
    const image = document.createElement("img");
    image.src = img;
    image.onclick = () => loadGame(url);
    card.appendChild(image);
  }

  const button = document.createElement("button");
  button.textContent = name;
  button.onclick = () => loadGame(url);
  card.appendChild(button);

  document.getElementById("buttons").appendChild(card);
}

/* SEARCH */
document.getElementById("searchBar").addEventListener("input", function () {
  const query = this.value.toLowerCase();
  document.querySelectorAll(".game-card").forEach(card => {
    card.style.display = card.dataset.name.includes(query) ? "block" : "none";
  });
});

/* LOAD GAME */
function loadGame(url) {
  fetch(url)
    .then(res => res.text())
    .then(html => {
      const css = `
      <style>
        body { font-family: inherit; margin: 0; }
        .game-header {
          width: 100%;
          padding: 10px 0;
          background: #222;
          color: white;
          font-size: 26px;
          text-align: center;
          position: fixed;
          top: 0;
          left: 0;
          z-index: 9999;
        }
        .fullscreen-btn, .exit-btn {
          float: right;
          margin-right: 20px;
          padding: 8px 15px;
          background: #1e90ff;
          border: none;
          border-radius: 5px;
          color: white;
          cursor: pointer;
          margin-left: 10px;
        }
        :fullscreen .game-header { display: none; }
      </style>`;

      const header = `
      <div class="game-header">
        TinyMath
        <button class="exit-btn" onclick="location.reload()">Exit</button>
        <button class="fullscreen-btn" onclick="document.documentElement.requestFullscreen()">Fullscreen</button>
      </div>
      <div style="height:20px;"></div>`;

      document.open();
      document.write(css + header + html);
      document.close();
    });
}

/* ADD GAMES */

</script>

</body><script>
const CDN_BASE = "https://cdn.jsdelivr.net/gh/Tinymath/v2/";
const IMG_PATH = CDN_BASE + "images/png/";

fetch("https://api.github.com/repos/Tinymath/v2/contents")
  .then(res => res.json())
  .then(files => {
    files
      .filter(f => f.name.endsWith(".html"))
      .forEach(f => {
        const fileName = f.name.replace(".html", "");
        const gameName = fileName
          .replace(/[-_]/g, " ")
          .replace(/\b\w/g, c => c.toUpperCase());

        // Use images/png folder
        const img = IMG_PATH + fileName + ".png";

        add(gameName, CDN_BASE + f.name, img);
      });
  });
</script>
</html>
