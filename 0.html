<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>tinymath</title>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<text y='.9em' font-size='90'>🎮</text></svg>">

<meta name="description" content="TinyMath — a clean, fast game hub with 1000+ games.">

<style>
/* ---------------- GLOBAL ---------------- */
body {
  background: #0d0d0d;
  color: #fff;
  font-family: "Segoe UI", Arial, sans-serif;
  margin: 0;
  padding: 0;
  text-align: center;
  transition: background 0.3s ease, color 0.3s ease;
}

h1 {
  margin: 25px 0 10px;
  font-size: 40px;
  font-weight: 700;
  letter-spacing: 1px;
}

/* ---------------- SETTINGS BUTTON (TOP RIGHT) ---------------- */
.settings-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  padding: 10px 16px;
  background: #444;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  z-index: 9999;
}

.settings-btn:hover {
  background: #666;
}

/* ---------------- SETTINGS PANEL ---------------- */
#settingsPanel {
  position: fixed;
  top: 60px;
  right: 15px;
  background: #1a1a1a;
  padding: 20px;
  border-radius: 12px;
  width: 240px;
  display: none;
  z-index: 9999;
  color: white;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

#settingsPanel h3 {
  margin-top: 0;
  font-size: 20px;
}

.color-input {
  width: 100%;
  margin-top: 10px;
}

.theme-btn {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #333;
  color: white;
}

.theme-btn:hover {
  background: #555;
}

/* ---------------- SEARCH ---------------- */
#searchBar {
  width: 350px;
  padding: 12px;
  font-size: 17px;
  border-radius: 8px;
  border: none;
  outline: none;
  margin-bottom: 25px;
  background: #222;
  color: white;
}

/* ---------------- GAME GRID ---------------- */
#buttons {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 25px;
  padding: 20px;
  max-width: 1300px;
  margin: auto;
}

.game-card {
  text-align: center;
  background: #1a1a1a;
  padding: 15px;
  border-radius: 12px;
  transition: transform 0.2s ease, background 0.2s ease;
}

.game-card:hover {
  transform: translateY(-5px);
  background: #222;
}

.game-card img {
  width: 150px;
  height: 150px;
  object-fit: cover;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.2s ease;
}

.game-card img:hover {
  transform: scale(1.05);
}

.game-card button {
  width: 150px;
  padding: 10px;
  margin-top: 10px;
  font-size: 16px;
  background: #1e90ff;
  border: none;
  border-radius: 6px;
  color: white;
  cursor: pointer;
  transition: background 0.2s ease;
}

.game-card button:hover {
  background: #0f6ed6;
}
</style>
</head>

<body>

<!-- ---------------- SETTINGS BUTTON ---------------- -->
<button class="settings-btn" onclick="toggleSettings()">⚙️ Settings</button>

<!-- ---------------- SETTINGS PANEL ---------------- -->
<div id="settingsPanel">
  <h3>Settings</h3>

  <label>Background Color:</label>
  <input type="color" id="bgColorPicker" class="color-input">

  <button class="theme-btn" onclick="setTheme('dark')">Dark Theme</button>
  <button class="theme-btn" onclick="setTheme('light')">Light Theme</button>
  <button class="theme-btn" onclick="setTheme('neon')">Neon Theme</button>
  <button class="theme-btn" onclick="setTheme('amoled')">AMOLED Black</button>
</div>

<!-- ---------------- MAIN CONTENT ---------------- -->
<h1>Tinymath</h1>
<input id="searchBar" type="text" placeholder="Search books...">
<div id="buttons"></div>

<script>
/* ---------------- SETTINGS ---------------- */
function toggleSettings() {
  const panel = document.getElementById("settingsPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

document.getElementById("bgColorPicker").addEventListener("input", (e) => {
  document.body.style.background = e.target.value;
});

function setTheme(theme) {
  if (theme === "dark") {
    document.body.style.background = "#0d0d0d";
    document.body.style.color = "#fff";
  }
  if (theme === "light") {
    document.body.style.background = "#f2f2f2";
    document.body.style.color = "#000";
  }
  if (theme === "neon") {
    document.body.style.background = "#0f002b";
    document.body.style.color = "#39ff14";
  }
  if (theme === "amoled") {
    document.body.style.background = "#000";
    document.body.style.color = "#fff";
  }
}

/* ---------------- GAME SYSTEM ---------------- */
const games = [];

function add(name, url, img = null) {
  games.push({ name, url, img });

  const card = document.createElement("div");
  card.className = "game-card";
  card.dataset.name = name.toLowerCase();

  if (img) {
    const image = document.createElement("img");
    image.src = img;
    image.onclick = () => loadGame(url);
    card.appendChild(image);
  }

  const button = document.createElement("button");
  button.textContent = name;
  button.onclick = () => loadGame(url);
  card.appendChild(button);

  document.getElementById("buttons").appendChild(card);
}

/* ---------------- SEARCH ---------------- */
document.getElementById("searchBar").addEventListener("input", function () {
  const query = this.value.toLowerCase();
  document.querySelectorAll(".game-card").forEach(card => {
    card.style.display = card.dataset.name.includes(query) ? "block" : "none";
  });
});

/* ---------------- LOAD GAME ---------------- */
function loadGame(url) {
  fetch(url)
    .then(res => res.text())
    .then(html => {
      const css = `
      <style>
        body { font-family: inherit; margin: 0; }
        .game-header {
          width: 100%;
          padding: 8px 0;
          background: #222;
          color: white;
          font-size: 24px;
          text-align: center;
          position: fixed;
          top: 0;
          left: 0;
          z-index: 9999;
        }
        .fullscreen-btn, .exit-btn {
          float: right;
          margin-right: 20px;
          padding: 8px 15px;
          background: #1e90ff;
          border: none;
          border-radius: 5px;
          color: white;
          cursor: pointer;
          margin-left: 10px;
        }
        :fullscreen .game-header { display: none; }
      </style>`;

      const header = `
      <div class="game-header">
        TinyMath
        <button class="exit-btn" onclick="location.reload()">Exit</button>
        <button class="fullscreen-btn" onclick="document.documentElement.requestFullscreen()">Fullscreen</button>
      </div>
      <div style="height:20px;"></div>`;

      document.open();
      document.write(css + header + html);
      document.close();
    });
}

/* ---------------- ADD GAMES ---------------- */
add("1 on 1 soccer",
  "https://cdn.jsdelivr.net/gh/Tinymath/v2/1on1soccer.html",
  "https://th.bing.com/th/id/OIP.o8k5W_b5ab9j2sJ0NfBlugAAAA?w=254&h=173&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"
);

add("3d tanks",
  "https://cdn.jsdelivr.net/gh/Tinymath/v2/3dtanks.html",
  "https://th.bing.com/th?q=3D+Civil+War+Tank&w=120&h=120&c=1&rs=1&qlt=70&o=7&cb=1&dpr=1.3&pid=InlineBlock&rm=3&mkt=en-US&cc=US&setlang=en&adlt=strict&t=1&mw=247"
);

add("2048",
  "https://cdn.jsdelivr.net/gh/Tinymath/v2/2048.html",
  "https://th.bing.com/th/id/OIP.L_bQEFJ-kMEdVwIrRo2k7wHaHa?w=108&h=108&c=1&bgcl=d0ecb0&r=0&o=7&dpr=1.3&pid=ImgRC&rm=3"
);

add("Abobos big adventure",
  "https://cdn.jsdelivr.net/gh/Tinymath/v2/abobosbigadventure.html",
  "https://th.bing.com/th/id/OIP.Y1p-SW79Xpd1sefC_672CAAAAA?w=139&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"
);

add("Achievement unlocked 1",
  "https://cdn.jsdelivr.net/gh/Tinymath/v2/achievementunlocked.html",
  "https://th.bing.com/th/id/OIP.lIUfIYjCuJEMirwT-Aia5QHaEc?w=240&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"
);

add("Achievement unlocked 2",
  "https://cdn.jsdelivr.net/gh/Tinymath/v2/achievementunlocked2.html",
  "https://th.bing.com/th/id/OIP.lIUfIYjCuJEMirwT-Aia5QHaEc?w=240&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"
);

add("Achievement unlocked 3",
  "https://cdn.jsdelivr.net/gh/Tinymath/v2/achievementunlocked3.html",
  "https://th.bing.com/th/id/OIP.lIUfIYjCuJEMirwT-Aia5QHaEc?w=240&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"
);

add("Action turnip",
  "https://cdn.jsdelivr.net/gh/Tinymath/v2/actionturnip.html",
  "https://th.bing.com/th/id/OIP.OOf7pU6UKkcwHUH1szpjuAAAAA?w=135&h=140&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"
);

add("Adaran",
  "https://cdn.jsdelivr.net/gh/Tinymath/v2/adaran.html",
  "https://th.bing.com/th/id/OIP.PxWsnGKVi3KrApgMU_gaLgAAAA?w=143&h=150&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"
);
</script>

</body>
</html>
