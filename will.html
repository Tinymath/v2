<script>
const CDN_BASE = "https://cdn.jsdelivr.net/gh/Tinymath/v2/";

fetch("https://api.github.com/repos/Tinymath/v2/contents")
  .then(res => res.json())
  .then(files => {
    files
      .filter(f => f.name.endsWith(".html"))
      .forEach(f => {
        const fileName = f.name.replace(".html", "");
        const gameName = fileName
          .replace(/[-_]/g, " ")
          .replace(/\b\w/g, c => c.toUpperCase());

        // Automatically use image with same name
        const img = CDN_BASE + fileName + ".png";

        add(gameName, CDN_BASE + f.name, img);
      });
  });
</script>
